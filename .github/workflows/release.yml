name: Release Tickr Desktop

# Build installers for macOS (Apple Silicon + Intel), Windows, and Linux.
#
# Triggers:
#   - push tag `v*`            → builds + creates a draft GitHub Release
#                                with all installers attached.
#   - workflow_dispatch         → manual run for smoke-testing the pipeline
#                                (no release is published).
#
# macOS notes:
#   We do NOT have an Apple Developer ID, so binaries are ad-hoc signed via
#   `APPLE_SIGNING_IDENTITY=-`. End users must bypass Gatekeeper on first
#   launch (right-click → Open, or `xattr -cr /Applications/Tickr.app`).
#   See `docs/install-unsigned.md`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag name for a manual smoke build (no release will be published)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - label: macos-x64
            os: macos-13
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - label: linux-x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ''
          - label: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.label }}

      # Tauri 2 on Linux needs WebKitGTK 4.1 + GTK + a few extras.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app and bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          # tauri-action always instantiates a GitHub API client (even when no
          # release will be published), so the token must be present.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign the macOS bundle so it runs locally without an Apple
          # Developer ID. Gatekeeper still warns on first launch — see
          # `docs/install-unsigned.md` for the bypass instructions.
          APPLE_SIGNING_IDENTITY: '-'
          # Skip Apple's notarization step (we have no developer credentials).
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Tickr {0}', github.ref_name) || '' }}
          releaseBody: |
            Tickr ${{ github.ref_name }} — desktop installers for macOS, Windows, and Linux.

            **macOS users:** these builds are ad-hoc signed (no Apple Developer ID).
            On first launch, right-click the app → Open, or run
            `xattr -cr /Applications/Tickr.app`. See
            `docs/install-unsigned.md` for details.
          releaseDraft: true
          prerelease: false
          # Only publish the release when a real version tag was pushed.
          # Manual `workflow_dispatch` runs still produce artifacts but do not
          # create or update a GitHub Release.
          includeUpdaterJson: false
          args: ${{ matrix.tauri_args }}

      - name: Upload installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tickr-${{ matrix.label }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
